<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd One Out — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a32;
  --accent:#f0e040;--accent2:#ff5f40;--accent3:#40d9a0;
  --text:#f0eff5;--muted:#7a7a8c;--token:#f59e0b;
  --gold:#fbbf24;--purple:#a78bfa;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --r:12px;--rb:16px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb)}

/* ── LAYOUT ── */
.admin-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100}
.main{margin-left:220px;flex:1;padding:32px;max-width:1100px}

/* ── SIDEBAR ── */
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo-title{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--text)}
.sidebar-logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.sidebar-nav{padding:12px 0;flex:1;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:0;transition:background .1s,color .1s;border-left:2px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.sidebar-version{font-size:11px;color:var(--muted)}

/* ── HEADER ── */
.page-header{margin-bottom:28px}
.page-title{font-family:var(--fd);font-size:28px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--muted)}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rb);padding:16px}
.stat-card-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat-card-value{font-family:var(--fd);font-size:32px;font-weight:800;color:var(--text)}
.stat-card-sub{font-size:12px;color:var(--muted);margin-top:4px}
.stat-card.accent .stat-card-value{color:var(--accent)}
.stat-card.green .stat-card-value{color:var(--accent3)}
.stat-card.orange .stat-card-value{color:var(--token)}
.stat-card.purple .stat-card-value{color:var(--purple)}

/* ── SECTION ── */
.section{margin-bottom:32px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:var(--fd);font-size:18px;font-weight:700}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:transform .08s,opacity .1s;border:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#0d0d0f}
.btn-danger{background:rgba(255,95,64,.12);color:var(--accent2);border:1px solid rgba(255,95,64,.25)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-success{background:rgba(64,217,160,.12);color:var(--accent3);border:1px solid rgba(64,217,160,.25)}
.btn-sm{padding:6px 12px;font-size:12px}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rb);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge.monthly{background:rgba(251,191,36,.12);color:var(--gold)}
.badge.challenge{background:rgba(232,121,249,.1);color:#e879f9}
.badge.daily{background:rgba(167,139,250,.1);color:var(--purple)}
.badge.active{background:rgba(64,217,160,.12);color:var(--accent3)}
.badge.ended{background:rgba(255,95,64,.1);color:var(--accent2)}
.badge.draft{background:var(--surface2);color:var(--muted)}

/* ── FORM ── */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rb);padding:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field.span2{grid-column:span 2}
.field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.field-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.field-input:focus{border-color:var(--accent)}
.field-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;width:100%;cursor:pointer;-webkit-appearance:none}
.field-select:focus{border-color:var(--accent)}
.field-textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;width:100%;min-height:80px;resize:vertical}
.field-textarea:focus{border-color:var(--accent)}
.form-divider{grid-column:span 2;border:none;border-top:1px solid var(--border);margin:4px 0}
.form-section-title{grid-column:span 2;font-family:var(--fd);font-size:14px;font-weight:700;color:var(--muted);padding-top:4px}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* ── PRIZE TYPE TOGGLE ── */
.prize-toggle{display:flex;gap:8px}
.prize-toggle-btn{flex:1;padding:10px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.prize-toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,224,64,.06)}

/* ── PODIUM BUILDER ── */
.podium-builder{display:flex;flex-direction:column;gap:8px}
.podium-row-build{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:var(--r);padding:10px 12px}
.podium-rank-lbl{font-size:18px;min-width:28px}
.podium-inputs{display:flex;gap:8px;flex:1}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:800}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--muted);font-size:16px}

/* ── LEADERBOARD TABLE ── */
.lb-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--rb);overflow:hidden}
.lb-preview-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)}
.lb-preview-row:last-child{border-bottom:none}
.lb-preview-row.you{background:rgba(240,224,64,.04)}
.lb-rank{font-family:var(--fd);font-size:15px;font-weight:800;min-width:24px}
.lb-flag{font-size:16px;min-width:20px}
.lb-name-col{flex:1;font-size:13px;font-weight:500}
.lb-score-col{font-family:var(--fd);font-size:15px;font-weight:800}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);opacity:0;transition:all .2s;pointer-events:none;z-index:2000}
.toast.show{opacity:1}
.toast.success{border-color:rgba(64,217,160,.4);color:var(--accent3)}
.toast.error{border-color:rgba(255,95,64,.4);color:var(--accent2)}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active{background:var(--surface);border-color:var(--accent);color:var(--accent)}

/* ── ACTIVITY FEED ── */
.activity-feed{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.activity-text{flex:1;font-size:13px}
.activity-text strong{color:var(--text)}
.activity-time{font-size:11px;color:var(--muted);white-space:nowrap}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-logo,.nav-section,.nav-item span,.sidebar-footer{display:none}
  .main{margin-left:60px;padding:16px}
  .form-grid{grid-template-columns:1fr}
  .form-grid.cols3{grid-template-columns:1fr}
  .field.span2{grid-column:span 1}
  .form-section-title,.form-divider{grid-column:span 1}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="admin-wrap">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-title">🧠 Odd One Out</div>
    <div class="sidebar-logo-sub">Admin Panel</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </div>
    <div class="nav-section">Competitions</div>
    <div class="nav-item" onclick="showPage('competitions')">
      <span class="nav-icon">🏆</span><span>All Competitions</span>
    </div>
    <div class="nav-item" onclick="showPage('new-comp')">
      <span class="nav-icon">➕</span><span>New Competition</span>
    </div>
    <div class="nav-section">Players</div>
    <div class="nav-item" onclick="showPage('leaderboard')">
      <span class="nav-icon">🥇</span><span>Leaderboard</span>
    </div>
    <div class="nav-item" onclick="showPage('players')">
      <span class="nav-icon">👥</span><span>Players</span>
    </div>
    <div class="nav-section">Economy</div>
    <div class="nav-item" onclick="showPage('tokens')">
      <span class="nav-icon">🪙</span><span>Token Config</span>
    </div>
    <div class="nav-section">Content</div>
    <div class="nav-item" onclick="showPage('questions')">
      <span class="nav-icon">❓</span><span>Questions</span>
    </div>
    <div class="nav-section">Settings</div>
    <div class="nav-item" onclick="showPage('settings')">
      <span class="nav-icon">⚙️</span><span>Settings</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-version">v1.0.0 — Demo mode</div>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main" id="main"></div>

</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Edit Competition</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// DATA STORE (localStorage)
// ═══════════════════════════════════════════════════
function loadData(key,def){
  try{const v=localStorage.getItem('admin_'+key);return v?JSON.parse(v):def;}catch(e){return def;}
}
function saveData(key,val){
  try{localStorage.setItem('admin_'+key,JSON.stringify(val));}catch(e){}
}

// Default competitions
const DEFAULT_COMPS = [
  {
    id:'monthly-may',type:'monthly',name:'May Championship',
    status:'active',entryCost:80,endDate:'2025-05-31',
    players:1247,entries:1247,
    prize:{type:'physical',icon:'⌚',name:'Apple Watch Series 9',value:'$399'},
    podium:[
      {rank:'🥇',prize:'Apple Watch Series 9',sub:'$399 value'},
      {rank:'🥈',prize:'AirPods Pro',sub:'$249 value'},
      {rank:'🥉',prize:'500 Tokens',sub:'🪙 500'},
    ],
    created:'2025-05-01',
  },
  {
    id:'challenge-science',type:'challenge',name:'Science Genius',
    status:'active',entryCost:50,endDate:'2025-05-20',
    players:342,entries:342,
    prize:{type:'tokens',icon:'🪙',name:'500 Tokens',value:'Top 3 win'},
    podium:[
      {rank:'🥇',prize:'300 Tokens',sub:'🪙 300'},
      {rank:'🥈',prize:'150 Tokens',sub:'🪙 150'},
      {rank:'🥉',prize:'50 Tokens',sub:'🪙 50'},
    ],
    created:'2025-05-10',
  },
  {
    id:'daily',type:'daily',name:'Daily Tournament',
    status:'active',entryCost:20,endDate:null,
    players:3841,entries:3841,
    prize:{type:'tokens',icon:'🪙',name:'200 Tokens',value:'Top 3 win'},
    podium:[
      {rank:'🥇',prize:'200 Tokens',sub:'🪙 200'},
      {rank:'🥈',prize:'100 Tokens',sub:'🪙 100'},
      {rank:'🥉',prize:'50 Tokens',sub:'🪙 50'},
    ],
    created:'2025-05-01',
  },
];

const DEFAULT_TOKEN_CONFIG = {
  packs:[
    {id:'starter',name:'Starter',amount:100,price:'$0.99',bonus:0},
    {id:'best',name:'Best Value',amount:550,price:'$4.99',bonus:50},
    {id:'pro',name:'Pro Pack',amount:1200,price:'$9.99',bonus:200},
  ],
  earn:{
    daily_login:10,streak_7:50,correct_3:5,invite:100,register:50,
    free_perfect:15,free_80pct:8,free_60pct:4,free_any:2,
  },
  cost:{challenge:50,daily:20,monthly:80},
};

const DEFAULT_SETTINGS = {
  gameName:'Odd One Out',
  shareUrl:'https://oddoneout.app',
  timerSeconds:10,
  freeQuestions:12,
  challengeLevels:10,
  maintenanceMode:false,
};

let COMPS = loadData('comps', DEFAULT_COMPS);
let TOKEN_CFG = loadData('tokens', DEFAULT_TOKEN_CONFIG);
let SETTINGS = loadData('settings', DEFAULT_SETTINGS);

// Fake player data for demo
const FAKE_PLAYERS = [
  {name:'NightOwl99',flag:'🇩🇪',avatar:'🦊',tokens:340,games:47,streak:12,score:940,registered:true,joined:'2025-04-15',achs:3},
  {name:'QuizKing',flag:'🇺🇸',avatar:'👑',tokens:210,games:63,streak:8,score:920,registered:true,joined:'2025-04-20',achs:4},
  {name:'BrainBlast',flag:'🇭🇷',avatar:'🧠',tokens:580,games:35,streak:5,score:880,registered:true,joined:'2025-05-01',achs:2},
  {name:'TrickMaster',flag:'🇯🇵',avatar:'🎩',tokens:90,games:28,streak:3,score:860,registered:true,joined:'2025-05-03',achs:2},
  {name:'SpeedDemon',flag:'🇬🇧',avatar:'⚡',tokens:420,games:19,streak:7,score:820,registered:true,joined:'2025-05-05',achs:1},
  {name:'CuriousCat',flag:'🇫🇷',avatar:'🐯',tokens:150,games:22,streak:4,score:790,registered:true,joined:'2025-05-06',achs:1},
  {name:'DeepThought',flag:'🇧🇷',avatar:'🤖',tokens:60,games:14,streak:2,score:740,registered:false,joined:'2025-05-08',achs:0},
  {name:'Mastermind',flag:'🇰🇷',avatar:'💎',tokens:280,games:31,streak:6,score:710,registered:true,joined:'2025-05-09',achs:1},
];

const FAKE_ACTIVITY = [
  {icon:'🏆',text:'<strong>NightOwl99</strong> completed May Championship with score 940',time:'2m ago'},
  {icon:'🪙',text:'<strong>BrainBlast</strong> purchased 550 tokens ($4.99)',time:'7m ago'},
  {icon:'🆕',text:'<strong>SpeedDemon</strong> registered a new account',time:'14m ago'},
  {icon:'⚡',text:'<strong>QuizKing</strong> entered Science Genius challenge',time:'22m ago'},
  {icon:'🔥',text:'<strong>TrickMaster</strong> achieved 7-day streak bonus (+50 tokens)',time:'38m ago'},
  {icon:'🪙',text:'<strong>CuriousCat</strong> purchased 100 tokens ($0.99)',time:'1h ago'},
  {icon:'🏆',text:'<strong>Mastermind</strong> entered Daily Tournament',time:'1h ago'},
  {icon:'🆕',text:'<strong>DeepThought</strong> started playing as guest',time:'2h ago'},
];

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
let currentPage='dashboard';

function showPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navMap={
    dashboard:0,competitions:2,
    'new-comp':3,leaderboard:4,players:5,
    tokens:6,questions:7,settings:8,
  };
  const items=document.querySelectorAll('.nav-item');
  // match by text content
  items.forEach(item=>{
    const span=item.querySelector('span:last-child');
    if(!span)return;
    const pageMap={
      'dashboard':'Dashboard','competitions':'All Competitions',
      'new-comp':'New Competition','leaderboard':'Leaderboard',
      'players':'Players','tokens':'Token Config',
      'questions':'Questions','settings':'Settings',
    };
    if(span.textContent===pageMap[page])item.classList.add('active');
  });
  renderPage(page);
}

function renderPage(page){
  const main=document.getElementById('main');
  switch(page){
    case 'dashboard':    main.innerHTML=pageDashboard();break;
    case 'competitions': main.innerHTML=pageCompetitions();break;
    case 'new-comp':     main.innerHTML=pageNewComp();break;
    case 'leaderboard':  main.innerHTML=pageLeaderboard();break;
    case 'players':      main.innerHTML=pagePlayers();break;
    case 'tokens':       main.innerHTML=pageTokens();break;
    case 'questions':    main.innerHTML=pageQuestions();break;
    case 'settings':     main.innerHTML=pageSettings();break;
    default:             main.innerHTML=pageDashboard();
  }
  bindFormEvents();
}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function pageDashboard(){
  const totalPlayers=FAKE_PLAYERS.length+Math.floor(Math.random()*10);
  const activeComps=COMPS.filter(c=>c.status==='active').length;
  const totalEntries=COMPS.reduce((s,c)=>s+c.entries,0);
  const totalRevenue=(totalEntries*2.4).toFixed(0);

  return `
    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <div class="page-sub">Welcome back. Here's what's happening.</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-card-label">Total Players</div>
        <div class="stat-card-value">${totalPlayers.toLocaleString()}</div>
        <div class="stat-card-sub">+12 this week</div>
      </div>
      <div class="stat-card green">
        <div class="stat-card-label">Active Competitions</div>
        <div class="stat-card-value">${activeComps}</div>
        <div class="stat-card-sub">${COMPS.length} total created</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-card-label">Token Entries</div>
        <div class="stat-card-value">${totalEntries.toLocaleString()}</div>
        <div class="stat-card-sub">Across all competitions</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-card-label">Est. Revenue</div>
        <div class="stat-card-value">$${totalRevenue}</div>
        <div class="stat-card-sub">From token purchases</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="section">
        <div class="section-header">
          <div class="section-title">Active Competitions</div>
          <button class="btn btn-primary btn-sm" onclick="showPage('new-comp')">+ New</button>
        </div>
        <div class="table-wrap">
          <table>
            <tr><th>Name</th><th>Type</th><th>Entries</th><th>Status</th></tr>
            ${COMPS.map(c=>`
              <tr onclick="editComp('${c.id}')" style="cursor:pointer">
                <td><strong>${c.name}</strong></td>
                <td><span class="badge ${c.type}">${c.type}</span></td>
                <td>${c.entries.toLocaleString()}</td>
                <td><span class="badge ${c.status}">${c.status}</span></td>
              </tr>

function setPrizeType(type,btn){
  document.querySelectorAll('.prize-toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cf_prize_type').value=type;
  if(type==='tokens'){
    document.getElementById('cf_prize_icon').value='🪙';
    document.getElementById('cf_prize_name').value='Tokens';
  }
}

function saveComp(editId){
  const name=document.getElementById('cf_name').value.trim();
  if(!name){showToast('Competition name is required','error');return;}

  const comp={
    id:editId||'comp_'+Date.now(),
    name,
    type:document.getElementById('cf_type').value,
    status:document.getElementById('cf_status').value,
    entryCost:parseInt(document.getElementById('cf_cost').value)||80,
    endDate:document.getElementById('cf_end').value||null,
    players:0,entries:0,
    prize:{
      type:document.getElementById('cf_prize_type').value,
      icon:document.getElementById('cf_prize_icon').value||'🏆',
      name:document.getElementById('cf_prize_name').value,
      value:document.getElementById('cf_prize_value').value,
    },
    podium:[0,1,2].map(i=>({
      rank:['🥇','🥈','🥉'][i],
      prize:document.getElementById(`cf_pod${i}_prize`).value,
      sub:document.getElementById(`cf_pod${i}_sub`).value,
    })),
    created:editId?undefined:new Date().toISOString().split('T')[0],
  };

  if(editId){
    const idx=COMPS.findIndex(c=>c.id===editId);
    if(idx>=0){comp.players=COMPS[idx].players;comp.entries=COMPS[idx].entries;comp.created=COMPS[idx].created;COMPS[idx]=comp;}
  }else{
    COMPS.push(comp);
  }
  saveData('comps',COMPS);
  // Also update game's localStorage
  try{localStorage.setItem('COMPETITIONS',JSON.stringify(COMPS));}catch(e){}
  showToast(editId?'✅ Competition updated!':'🚀 Competition launched!','success');
  showPage('competitions');
}

function editComp(id){
  const comp=COMPS.find(c=>c.id===id);
  if(!comp)return;
  document.getElementById('main').innerHTML=pageNewComp(comp);
  bindFormEvents();
}

function endComp(id){
  if(!confirm('End this competition? Players will no longer be able to enter.'))return;
  const c=COMPS.find(c=>c.id===id);
  if(c){c.status='ended';saveData('comps',COMPS);showToast('Competition ended','success');showPage('competitions');}
}

function activateComp(id){
  const c=COMPS.find(c=>c.id===id);
  if(c){c.status='active';saveData('comps',COMPS);showToast('Competition activated!','success');showPage('competitions');}
}

function pickWinner(){

function exportLb(){
  const rows=[['Rank','Name','Country','Score','Games'],...FAKE_PLAYERS.sort((a,b)=>b.score-a.score).map((p,i)=>[i+1,p.name,p.flag,p.score,p.games])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leaderboard.csv';a.click();
  showToast('📥 CSV downloaded','success');
}

        <div class="form-actions">
          <button class="btn btn-primary" onclick="addQuestion()">Add Question</button>
        </div>
      </div>
    </div>
  `;
}

function addQuestion(){
  const txt=document.getElementById('q_text').value.trim();
  if(!txt){showToast('Question text is required','error');return;}
  showToast('✅ Question added to pool!','success');
  // In production: save to DB
}

// SETTINGS
// ═══════════════════════════════════════════════════
function pageSettings(){
  const s=SETTINGS;
  return `
    <div class="page-header">
      <div class="page-title">Settings</div>
      <div class="page-sub">Game configuration and general settings</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="section">
        <div class="section-title" style="margin-bottom:12px">Game Settings</div>
        <div class="form-card">
          <div class="form-grid cols1">
            <div class="field">
              <div class="field-label">Game Name</div>
              <input class="field-input" id="s_name" value="${s.gameName}">
            </div>
            <div class="field">
              <div class="field-label">Share URL</div>
              <input class="field-input" id="s_url" value="${s.shareUrl}" placeholder="https://yoursite.com">
            </div>
            <div class="field">
              <div class="field-label">Timer (seconds per question)</div>
              <input class="field-input" id="s_timer" type="number" value="${s.timerSeconds}" min="5" max="30">
            </div>
            <div class="field">
              <div class="field-label">Free Mode Questions</div>
              <input class="field-input" id="s_free_q" type="number" value="${s.freeQuestions}" min="5" max="20">
            </div>
            <div class="field">
              <div class="field-label">Challenge Levels</div>
              <input class="field-input" id="s_challenge_lvl" type="number" value="${s.challengeLevels}" min="5" max="15">
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="saveSettings()">Save Settings</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-bottom:12px">Maintenance Mode</div>
        <div class="form-card">
          <p style="font-size:13px;color:var(--muted);margin-bottom:14px">When enabled, players see a maintenance message and cannot play. Use during updates.</p>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
            <span style="font-size:13px;font-weight:600">${s.maintenanceMode?'🔴 Currently ON':'🟢 Currently OFF'}</span>
          </div>
          <button class="btn ${s.maintenanceMode?'btn-success':'btn-danger'}" onclick="toggleMaintenance()">
            ${s.maintenanceMode?'Turn Off Maintenance':'Turn On Maintenance'}
          </button>
        </div>

        <div class="section-title" style="margin-bottom:12px;margin-top:20px">Data Management</div>
        <div class="form-card">
          <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Reset admin configuration to defaults. Player data is not affected.</p>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="exportConfig()">Export Config</button>
            <button class="btn btn-danger" onclick="resetConfig()">Reset to Defaults</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function saveSettings(){
  SETTINGS={
    gameName:document.getElementById('s_name').value||'Odd One Out',
    shareUrl:document.getElementById('s_url').value||'https://oddoneout.app',
    timerSeconds:parseInt(document.getElementById('s_timer').value)||10,
    freeQuestions:parseInt(document.getElementById('s_free_q').value)||12,
    challengeLevels:parseInt(document.getElementById('s_challenge_lvl').value)||10,
    maintenanceMode:SETTINGS.maintenanceMode,
  };
  saveData('settings',SETTINGS);
  try{localStorage.setItem('GAME_SETTINGS',JSON.stringify(SETTINGS));}catch(e){}
  showToast('✅ Settings saved!','success');
}

function toggleMaintenance(){
  SETTINGS.maintenanceMode=!SETTINGS.maintenanceMode;
  saveData('settings',SETTINGS);
  showToast(SETTINGS.maintenanceMode?'🔴 Maintenance mode ON':'🟢 Maintenance mode OFF','success');
  renderPage('settings');
}

function exportConfig(){
  const config={competitions:COMPS,tokens:TOKEN_CFG,settings:SETTINGS};
  const blob=new Blob([JSON.stringify(config,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='oddoneout_config.json';a.click();
  showToast('📥 Config exported','success');
}

function resetConfig(){
  if(!confirm('Reset all config to defaults?'))return;
  COMPS=DEFAULT_COMPS;TOKEN_CFG=DEFAULT_TOKEN_CONFIG;SETTINGS=DEFAULT_SETTINGS;
  saveData('comps',COMPS);saveData('tokens',TOKEN_CFG);saveData('settings',SETTINGS);
  showToast('✅ Config reset to defaults','success');
  renderPage(currentPage);
}

// TOAST
// ═══════════════════════════════════════════════════
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',2500);
}
